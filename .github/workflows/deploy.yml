name: Deploy to GitHub Pages

on:
  # Deploy on every push to main (expects dist/ to be committed)
  push:
    branches: [master]
  # Allow manual trigger from the Actions UI
  workflow_dispatch:

# Grant the workflow write access to push to gh-pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Add .nojekyll (disable Jekyll processing)
        run: touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # Keep only the latest snapshot on gh-pages (no history bloat)
          force_orphan: true
          # Optional: set a custom commit message
          commit_message: "chore: deploy ${{ github.run_number }}"
